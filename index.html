<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artikel & Insight | Khohar Rohman</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="glass-nav">
        <div class="nav-container">
            <div class="brand-logo">
                <i class="fas fa-layer-group"></i>
                Khohar<span>Artikel</span>
            </div>
            <div class="nav-actions">
                <a href="https://khohar25.github.io/portofolio/" class="btn-back">
                    <i class="fas fa-arrow-left"></i> <span>Kembali ke Portofolio</span>
                </a>
                <button id="theme-toggle" title="Ubah Tema">
                    <i id="theme-icon" class="fas fa-moon"></i>
                </button>
            </div>
        </div>
    </nav>

    <header class="blog-hero">
        <div class="hero-content">
            <h1>Eksplorasi Ide & Teknologi</h1>
            <p>Ruang baca untuk berbagi insight seputar Software Engineering, Artificial Intelligence, dan perjalanan dunia IT.</p>
        </div>
    </header>

    <main class="container">
        <div class="section-title-wrapper">
            <h2>Artikel Terbaru</h2>
            <div class="title-line"></div>
        </div>

        <div id="blog-container" class="blog-grid">
            <div class="cute-robot-loader">
                <svg class="robot-body" viewBox="0 0 100 100" width="100" height="100">
                    <ellipse class="robot-shadow" cx="50" cy="90" rx="25" ry="5" fill="rgba(0,0,0,0.2)"/>
                    <line x1="50" y1="20" x2="50" y2="5" stroke="var(--accent-color)" stroke-width="4" stroke-linecap="round"/>
                    <circle class="robot-bulb" cx="50" cy="5" r="6" fill="#facc15" />
                    <rect x="20" y="20" width="60" height="45" rx="15" fill="var(--card-bg)" stroke="var(--accent-color)" stroke-width="3"/>
                    <rect class="robot-eye" x="35" y="35" width="8" height="12" rx="4" fill="var(--accent-color)"/>
                    <rect class="robot-eye" x="57" y="35" width="8" height="12" rx="4" fill="var(--accent-color)"/>
                    <circle cx="28" cy="45" r="4" fill="#ef4444" opacity="0.6"/>
                    <circle cx="72" cy="45" r="4" fill="#ef4444" opacity="0.6"/>
                    <path d="M 40 65 L 60 65 L 55 80 L 45 80 Z" fill="var(--accent-color)"/>
                </svg>
                <div class="robot-text">Please wait patiently, processing data<span class="dots"></span></div>
            </div>
        </div>
    </main>

    <footer class="glass-footer">
        <p>&copy; 2026 Khohar Rohman. Dibuat dengan dedikasi</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
