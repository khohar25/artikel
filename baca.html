<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memuat Artikel... | Ruang Baca Khohar</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">

    <style>
        :root {
            --reader-width: 850px;
            --tech-gradient: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
        }

        /* Reading Progress Bar */
        #progress-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.05);
            z-index: 2000;
        }
        #progress-bar {
            height: 100%;
            width: 0%;
            background: var(--tech-gradient);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.6);
            transition: width 0.1s ease;
        }

        /* Layout */
        .article-wrapper {
            max-width: var(--reader-width);
            margin: 120px auto 100px;
            padding: 0 25px;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .meta-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .category-badge {
            display: inline-block;
            padding: 6px 16px;
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent-color);
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .article-title {
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 25px;
            background: linear-gradient(to bottom, #fff 40%, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .info-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            color: var(--text-muted);
            font-size: 0.95rem;
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 0;
        }

        /* Cover Image High-Tech (Hero) */
        .hero-image-container {
            position: relative;
            margin: 50px 0;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            border: 1px solid var(--border-color);
        }

        .hero-image {
            width: 100%;
            height: auto;
            max-height: 550px;
            object-fit: cover;
            display: block;
        }

        /* Content Styling (The "Microsoft Word" Content) */
        .article-body {
            font-size: 1.2rem;
            line-height: 1.9;
            color: #cbd5e1;
            font-family: 'Inter', sans-serif;
        }

        /* --- BARIS PENJINAK GAMBAR MELEDAK DI SINI --- */
        .article-body img {
            max-width: 100%; /* Wajib biar gak meluber ke samping */
            height: auto; /* Biar proporsional gak gepeng */
            border-radius: 12px; /* Biar estetik dikit */
            display: block; /* Taruh tengah */
            margin: 30px auto; /* Kasih jarak atas bawah */
        }
        /* ------------------------------------------- */

        .article-body h2, .article-body h3 {
            color: #fff;
            margin-top: 50px;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .article-body p { margin-bottom: 25px; text-align: justify; }

        .article-body blockquote {
            border-left: 4px solid var(--accent-color);
            padding-left: 25px;
            margin: 40px 0;
            font-style: italic;
            color: var(--accent-color);
            background: rgba(56, 189, 248, 0.05);
            padding: 20px 25px;
            border-radius: 0 12px 12px 0;
        }

        .article-body pre, .article-body code {
            font-family: 'JetBrains Mono', monospace;
            background: #1e293b;
            padding: 4px 8px;
            border-radius: 6px;
            color: #38bdf8;
            font-size: 0.95rem;
        }

        /* Floating Action */
        .share-box {
            position: fixed;
            left: 50px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn-round {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-round:hover {
            background: var(--accent-color);
            color: #0b1120;
            transform: scale(1.1);
        }

        @media (max-width: 1100px) {
            .share-box { display: none; }
        }
    </style>
</head>
<body>

    <div id="progress-container"><div id="progress-bar"></div></div>

    <nav class="glass-nav">
        <div class="nav-container">
            <div class="brand-logo">
                <i class="fas fa-layer-group"></i> Khohar<span>Blog</span>
            </div>
            <div class="nav-actions">
                <a href="index.html" class="btn-back"><i class="fas fa-arrow-left"></i> Kembali</a>
            </div>
        </div>
    </nav>

    <div class="share-box">
        <div class="btn-round" title="Share Twitter"><i class="fab fa-twitter"></i></div>
        <div class="btn-round" title="Share LinkedIn"><i class="fab fa-linkedin-in"></i></div>
        <div class="btn-round" title="Copy Link"><i class="fas fa-link"></i></div>
    </div>

    <main class="article-wrapper">
        <div id="skeleton-loader" class="cute-robot-loader" style="padding: 100px 0;">
            <svg class="robot-body" viewBox="0 0 100 100" width="120" height="120">
                <ellipse class="robot-shadow" cx="50" cy="90" rx="25" ry="5" fill="rgba(0,0,0,0.2)"/>
                <line x1="50" y1="20" x2="50" y2="5" stroke="var(--accent-color)" stroke-width="4" stroke-linecap="round"/>
                <circle class="robot-bulb" cx="50" cy="5" r="6" fill="#facc15" />
                <rect x="20" y="20" width="60" height="45" rx="15" fill="var(--card-bg)" stroke="var(--accent-color)" stroke-width="3"/>
                <rect class="robot-eye" x="35" y="35" width="8" height="12" rx="4" fill="var(--accent-color)"/>
                <rect class="robot-eye" x="57" y="35" width="8" height="12" rx="4" fill="var(--accent-color)"/>
                <circle cx="28" cy="45" r="4" fill="#ef4444" opacity="0.6"/>
                <circle cx="72" cy="45" r="4" fill="#ef4444" opacity="0.6"/>
                <path d="M 40 65 L 60 65 L 55 80 L 45 80 Z" fill="var(--accent-color)"/>
            </svg>
            <div class="robot-text">Please wait patiently, processing data<span class="dots"></span></div>
        </div>

        <article id="main-content" style="display: none;">
            <header class="meta-header">
                <span id="target-kategori" class="category-badge">TEKNOLOGI</span>
                <h1 id="target-judul" class="article-title">Memuat Judul...</h1>
                
                <div class="info-bar">
                    <span><i class="far fa-calendar-alt"></i> <span id="target-tanggal"></span></span>
                    <span><i class="far fa-clock"></i> <span id="reading-time">5</span> Menit Baca</span>
                    <span><i class="far fa-user"></i> By Khohar</span>
                </div>
            </header>

            <div class="hero-image-container">
                <img id="target-cover" src="" alt="Cover" class="hero-image">
            </div>

            <div id="target-isi" class="article-body">
                </div>

            <div style="margin-top: 80px; padding-top: 40px; border-top: 1px solid var(--border-color); text-align: center;">
                <p style="color: var(--text-muted);">Selesai Membaca? Bagikan Insight ini!</p>
                <div style="display: flex; justify-content: center; gap: 15px; margin-top: 20px;">
                    <a href="index.html" class="btn-back" style="padding: 12px 30px;">Kembali ke Daftar Artikel</a>
                </div>
            </div>
        </article>
    </main>

    <footer class="glass-footer">
        <p>© 2026 Khohar Rohman. <i class="fas fa-bolt" style="color: var(--accent-color);"></i> Powered by AIFORA Engine.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://xwwlegzacxevmlmtceqh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh3d2xlZ3phY3hldm1sbXRjZXFoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MDA2NzEsImV4cCI6MjA5Mzk3NjY3MX0.C9qCfFVN9j8gtvsLVBFGh4I28gIRvJkYlp546-ssEgw';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Helper Link Google Drive VIP
        function getDirectLink(url) {
            if (!url) return 'https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=1200&q=80';
            if (url.includes('drive.google.com')) {
                const id = url.match(/\/d\/([a-zA-Z0-9-_]+)/) || url.match(/id=([a-zA-Z0-9-_]+)/);
                // Jalur render VIP
                return id ? `https://lh3.googleusercontent.com/d/${id[1]}` : url;
            }
            return url;
        }

        // Hitung estimasi waktu baca
        function calculateReadingTime(text) {
            const wordsPerMinute = 200;
            const words = text.split(/\s+/).length;
            return Math.ceil(words / wordsPerMinute);
        }

        // Reading Progress Logic
        window.onscroll = function() {
            let winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            let scrolled = (winScroll / height) * 100;
            document.getElementById("progress-bar").style.width = scrolled + "%";
        };

        async function fetchArticle() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');

            if (!id) {
                window.location.href = 'index.html';
                return;
            }

            try {
                const { data, error } = await _supabase
                    .from('tabel_artikel')
                    .select('*')
                    .eq('id', id)
                    .single();

                if (error || !data) throw error;

                // Isi Data ke HTML
                document.title = `${data.judul} | Ruang Baca`;
                document.getElementById('target-judul').innerText = data.judul;
                document.getElementById('target-kategori').innerText = data.kategori || 'UNCATEGORIZED';
                document.getElementById('target-isi').innerHTML = data.isi_artikel;
                document.getElementById('target-cover').src = getDirectLink(data.link_gambar);
                
                // Format Tanggal
                let d = new Date(data.tanggal);
                document.getElementById('target-tanggal').innerText = d.toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric'});

                // Reading time
                document.getElementById('reading-time').innerText = calculateReadingTime(document.getElementById('target-isi').innerText);

                // Hilangkan Loader, Munculkan Konten
                document.getElementById('skeleton-loader').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';

            } catch (err) {
                console.error(err);
                document.getElementById('skeleton-loader').innerHTML = `<p style="color: #ef4444;">❌ Gagal Memuat Artikel. Pastikan koneksi stabil.</p>`;
            }
        }

        fetchArticle();
    </script>
</body>
</html>
